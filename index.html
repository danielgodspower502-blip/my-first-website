<!DOCTYPE html>
<html>
<head>
<title>Daniel's Website</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.card {
  background: #111827;
  padding: 40px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 0 25px rgba(0,0,0,0.4);
  max-width: 350px;
}

img {
  width: 120px;
  border-radius: 50%;
  margin-bottom: 15px;
}

h1 {
  margin: 10px 0 5px;
}

h2 {
  margin: 0 0 10px;
  font-size: 18px;
  color: #cbd5e1;
}

p {
  color: #9ca3af;
}

button {
  background: teal;
  border: none;
  padding: 12px 25px;
  color: white;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
  margin: 5px;
  transition: 0.3s;
}

button:hover {
  background: #14b8a6;
}
</style>

</head>

<body>

<div class="card">
<img src="https://i.imgur.com/6VBx3io.png">

<h1>Daniel</h1>
<h2>Beginner Web Developer</h2>

<p>I’m learning HTML, CSS, and JavaScript.</p>

<button onclick="showMessage()">Say Hi</button>
<button onclick="visitGithub()">My GitHub</button>
</div>

<script>
function showMessage() {
  alert("Thanks for visiting my website!");
}

function visitGithub() {
  window.location.href = "https://github.com";
}
</script>

</body>
</html>
